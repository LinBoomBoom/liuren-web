<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大六壬 · 在线排盘</title>
<style>
:root {
  --bg:#0a0e14; --card:#11161f; --card2:#161c27;
  --border:#1a2433; --border2:#212d3d;
  --gold:#c8a96e; --gold2:#a08048; --gold-lt:#e8d5b0;
  --text:#c4ccd6; --dim:#6f7682; --red:#e06060;
  --green:#5cb888; --blue:#68a0d8; --purple:#a888d8;
  --warn:#d4a840; --cyan:#58b8b0;
  --wood:#7ec87e; --fire:#e87060; --earth:#d8a858;
  --metal:#d4c870; --water:#60a0d8;
  --font:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.6}
.container{max-width:760px;margin:0 auto;padding:16px}

/* Header */
.header{text-align:center;padding:28px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.header h1{font-size:26px;color:var(--gold);letter-spacing:3px;font-weight:700}
.header p{font-size:12px;color:var(--dim);margin-top:4px;letter-spacing:1px}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px}
.card-title{font-size:13px;color:var(--gold-lt);margin-bottom:14px;letter-spacing:2px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:1.5px;flex-shrink:0}

/* Input */
.input-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.ig{display:flex;flex-direction:column;gap:3px}
.ig label{font-size:10px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase}
.ig input{background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 10px;font-size:14px;outline:none;width:64px;text-align:center;transition:border-color .2s}
.ig input:focus{border-color:var(--gold)}
.btn{background:linear-gradient(135deg,#c8a96e,#9a7840);color:#fff;border:none;border-radius:7px;padding:9px 22px;font-size:13px;cursor:pointer;letter-spacing:1px;font-weight:600;transition:opacity .2s;height:38px}
.btn:hover{opacity:.88}
.btn-ghost{background:transparent;border:1px solid var(--gold2);color:var(--gold);padding:8px 16px;font-size:12px}
.loading{text-align:center;padding:40px;display:none}
.loading.on{display:block}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Result */
#result{display:none}
#result.on{display:block}

/* Info bar */
.info-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.itag{background:rgba(200,169,110,.07);border:1px solid rgba(200,169,110,.15);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--gold-lt)}
.itag b{color:var(--gold);font-weight:600}

/* 天地盘 */
.pan-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3px;margin-bottom:8px}
.pan-grid.center-row{grid-template-columns:1fr 2fr 1fr}
.pan-cell{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 4px;text-align:center;min-height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.pan-cell .tp{font-size:22px;color:var(--gold);font-weight:700;line-height:1.2}
.pan-cell .tj{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.2}
.pan-cell .dg{font-size:9px;color:var(--purple);margin-top:1px}
.pan-cell .dp{font-size:10px;color:var(--dim);position:absolute;bottom:3px;right:6px}
.pan-cell .jc{font-size:9px;color:var(--blue);position:absolute;top:3px;left:6px}
.pan-cell.has-jc .tp{margin-top:4px}
.pan-center{display:flex;align-items:center;justify-content:center;background:var(--card2);border-radius:8px;border:1px solid var(--border2);text-align:center;flex-direction:column;gap:2px}
.pan-center .label{font-size:11px;color:var(--dim)}
.pan-center .val{font-size:15px;color:var(--gold-lt);font-weight:600}
.pan-center .sub{font-size:11px;color:var(--dim)}
@media(max-width:480px){.pan-cell{padding:8px 2px;min-height:64px}.pan-cell .tp{font-size:18px}}

/* 四课 */
.sike-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.sike-table th{font-size:10px;color:var(--dim);padding:4px 8px;text-align:center;font-weight:500}
.sike-table td{text-align:center;padding:8px 6px;border:1px solid var(--border2);font-size:14px;vertical-align:middle}
.sike-table .ss{color:var(--gold);font-size:20px;font-weight:700}
.sike-table .xj{font-size:12px;color:var(--dim)}
.sike-table .jx{font-size:12px;color:var(--text)}
.sike-table .rel-td{font-size:10px;color:var(--red)}
.sike-table .rel-td.good{color:var(--green)}

/* 三传 */
.sc-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.sc-block{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px 8px;text-align:center;position:relative;min-width:0}
.sc-block.init{border-color:rgba(200,169,110,.35);background:rgba(200,169,110,.04)}
.sc-block .ph{font-size:10px;color:var(--dim);margin-bottom:2px}
.sc-block .zhi{font-size:26px;color:var(--gold);font-weight:700;line-height:1.3}
.sc-block .sub{font-size:11px;color:var(--text);margin-top:1px}
.sc-block .keti-badge{position:absolute;top:-9px;right:-2px;background:var(--gold);color:#000;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap}
.sc-arrow{font-size:18px;color:var(--gold2);flex-shrink:0}
@media(max-width:480px){.sc-row{flex-direction:column;gap:4px}.sc-arrow{display:none}}

/* 十二天将 */
.tj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.tj-item{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:6px;text-align:center;font-size:10px;display:flex;flex-direction:column;gap:1px}
.tj-item .dz{color:var(--dim)}
.tj-item .nm{color:var(--gold-lt);font-size:11px;font-weight:500}
.tj-item.gr{border-color:rgba(200,169,110,.45);background:rgba(200,169,110,.06)}
@media(max-width:480px){.tj-grid{grid-template-columns:repeat(3,1fr)}}

/* 神煞 */
.ss-group{margin-bottom:10px}
.ss-group .ss-label{font-size:10px;color:var(--dim);margin-bottom:4px;letter-spacing:.5px}
.ss-row{display:flex;flex-wrap:wrap;gap:4px}
.ss-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(200,169,110,.06);border:1px solid rgba(200,169,110,.12);color:var(--gold-lt);cursor:default}
.ss-tag.bad{background:rgba(224,96,96,.06);border-color:rgba(224,96,96,.14);color:var(--red)}
.ss-tag .ss-v{color:var(--text);font-weight:500;margin-left:2px}

/* 干支分析 */
.an-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(30,40,55,.4);font-size:13px}
.an-row:last-child{border-bottom:none}
.an-row .L{color:var(--dim)}
.an-row .R{font-weight:500}
.an-row .R.g{color:var(--green)}
.an-row .R.b{color:var(--red)}
.an-row .R.w{color:var(--warn)}

/* Footer */
.ft{text-align:center;padding:20px;color:var(--dim);font-size:10px;border-top:1px solid var(--border);margin-top:20px;letter-spacing:1px}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>🔮 大六壬 · 排盘</h1>
  <p>天地盘 · 四课 · 三传 · 十二天将 · 课体分析</p>
</div>

<div class="card">
  <div class="card-title">起课时间</div>
  <div class="input-row">
    <div class="ig"><label>年</label><input id="y" type="number" value="2026"></div>
    <div class="ig"><label>月</label><input id="m" type="number" value="6" min="1" max="12"></div>
    <div class="ig"><label>日</label><input id="d" type="number" value="12" min="1" max="31"></div>
    <div class="ig"><label>时</label><input id="h" type="number" value="22" min="0" max="23"></div>
    <div class="ig"><label>分</label><input id="min" type="number" value="30" min="0" max="59"></div>
    <button class="btn" onclick="divine()">起 课</button>
    <button class="btn btn-ghost" onclick="divineNow()">此刻</button>
  </div>
</div>

<div class="loading" id="ld"><div class="spinner"></div><div style="color:var(--dim);font-size:13px">起课中…</div></div>
<div id="result"></div>
<div class="ft">晴子 · 大六壬排盘 | 基于《大六壬指南》《大六壬大全》</div>
</div>

<script>
// ===== 常量 =====
const WX_MAP={寅:'木',卯:'木',巳:'火',午:'火',申:'金',酉:'金',亥:'水',子:'水',辰:'土',戌:'土',丑:'土',未:'土'};
const GW_MAP={甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
const WO=['木','火','土','金','水'];
const JC_ORDER=['建','除','满','平','定','执','破','危','成','收','开','闭'];
const ZHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const PAN_ROW1=['巳','午','未','申'];
const PAN_ROW2L=['辰','','','酉'];
const PAN_ROW3L=['卯','','','戌'];
const PAN_ROW4=['寅','丑','子','亥'];
const JI_GONG={甲:'寅',乙:'辰',丙:'巳',丁:'未',戊:'巳',己:'未',庚:'申',辛:'戌',壬:'亥',癸:'丑'};

function wxRel(a,b){
  const wa=WX_MAP[a]||'',wb=WX_MAP[b]||'';
  if(!wa||!wb)return'';
  const ai=WO.indexOf(wa),bi=WO.indexOf(wb);
  if(ai===bi)return'比';
  if((ai+1)%5===bi)return'⬆生'; // a生b
  if((bi+1)%5===ai)return'⬇生';
  if((ai+2)%5===bi)return'⬇克'; // a克b
  return'⬆克';
}

function gwRel(a,b){
  const wa=WX_MAP[a]||'',wb=GW_MAP[b]||'';
  if(!wa||!wb)return'';
  const ai=WO.indexOf(wa),bi=WO.indexOf(wb);
  if(ai===bi)return'比';
  if((ai+2)%5===bi)return'⚡克干';
  if((bi+2)%5===ai)return'干克';
  return'生';
}

// ===== 主流程 =====
async function divine(){
  const y=+$('y').value,m=+$('m').value,d=+$('d').value,h=+$('h').value,mi=+$('min').value;
  if(!y||!m||!d){alert('请填写完整日期');return}
  $('ld').classList.add('on');$('result').classList.remove('on');
  try{
    const resp=await fetch('/api/liuren',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:y,month:m,day:d,hour:h,minute:mi})});
    const r=await resp.json();
    if(r.error){alert(r.error);return}
    render(r);
  }catch(e){alert('请求失败: '+e.message)}
  finally{$('ld').classList.remove('on')}
}

async function divineNow(){
  const n=new Date();
  $('y').value=n.getFullYear();$('m').value=n.getMonth()+1;$('d').value=n.getDate();
  $('h').value=n.getHours();$('min').value=n.getMinutes();
  await divine();
}

function $(id){return document.getElementById(id)}

// ===== 渲染 =====
function render(r){
  const bz=r.dateInfo.bazi.split(' '),riGanZhi=bz[2],riGan=riGanZhi[0],riZhi=riGanZhi[1];
  const tp=r.tianDiPan.tianPan,tj=r.tianDiPan.tianJiang,dp=r.tianDiPan.diPan;
  const dg=r.dunGan,jc=r.jianChu,ke=r.siKe,sc=r.sanChuan;
  let h='';

  // --- 信息栏 ---
  h+='<div class="info-bar">';
  h+=`<span class="itag">📅 ${r.dateInfo.date}</span>`;
  h+=`<span class="itag">八字 <b>${r.dateInfo.bazi}</b></span>`;
  h+=`<span class="itag">月将 <b>${r.dateInfo.yuejiang}</b></span>`;
  h+=`<span class="itag">空亡 <b>${r.dateInfo.kong.join('')}</b></span>`;
  h+=`<span class="itag">课体 <b>${sc.keTi}</b></span>`;
  h+=`<span class="itag">驿马 <b>${r.dateInfo.yima}</b></span>`;
  h+=`<span class="itag">旬 <b>${r.dateInfo.xun}</b></span>`;
  h+='</div>';

  // --- 天地盘 ---
  h+='<div class="card"><div class="card-title">天 地 盘</div>';

  // Row 1: 巳午未申
  h+='<div class="pan-grid">';
  for(const z of PAN_ROW1)h+=panCell(z,tp,tj,dg,jc,dp);
  h+='</div>';

  // Row 2: 辰 · center · 酉
  h+='<div class="pan-grid center-row">';
  h+=panCell('辰',tp,tj,dg,jc,dp);
  h+='<div class="pan-center">';
  h+=`<div class="label">月将 · ${r.dateInfo.yuejiang}</div>`;
  h+=`<div class="val">${riGanZhi}</div>`;
  h+=`<div class="sub">日干 · 日支</div>`;
  h+=`<div class="sub" style="margin-top:4px;color:var(--red)">空亡 ${r.dateInfo.kong.join('、')}</div>`;
  h+='</div>';
  h+=panCell('酉',tp,tj,dg,jc,dp);
  h+='</div>';

  // Row 3: 卯 · center · 戌
  h+='<div class="pan-grid center-row">';
  h+=panCell('卯',tp,tj,dg,jc,dp);
  h+='<div class="pan-center">';
  h+=`<div class="label">课体</div>`;
  h+=`<div class="val">${sc.keTi}</div>`;
  h+=`<div class="sub">${keTiDesc(sc.keTi)}</div>`;
  h+='</div>';
  h+=panCell('戌',tp,tj,dg,jc,dp);
  h+='</div>';

  // Row 4: 寅丑子亥
  h+='<div class="pan-grid">';
  for(const z of PAN_ROW4)h+=panCell(z,tp,tj,dg,jc,dp);
  h+='</div></div>';

  // --- 四课 ---
  const keNames=['日干阳','日干阴','日支阳','日支阴'];
  const keKeys=['ke1','ke2','ke3','ke4'];
  // 下神推导
  const xiaShen=[
    JI_GONG[riGan],
    (ke.ke1[0]||'').charAt(0),
    riZhi,
    (ke.ke3[0]||'').charAt(0)
  ];
  h+='<div class="card"><div class="card-title">四 课</div>';
  h+='<table class="sike-table"><thead><tr>';
  for(let i=3;i>=0;i--)h+=`<th>第${4-i}课<br>${keNames[i]}</th>`;
  h+='</tr></thead><tbody>';

  // 上神行
  h+='<tr>';
  for(let i=3;i>=0;i--){
    const shang=(ke[keKeys[i]][0]||'').charAt(0),jiang=ke[keKeys[i]][1]||'';
    const isKong=r.dateInfo.kong.includes(shang);
    h+=`<td><div class="ss" style="${isKong?'color:var(--red)':''}">${shang||'?'}</div><div class="jx">${jiang}</div></td>`;
  }
  h+='</tr>';

  // 生克关系行
  h+='<tr>';
  for(let i=3;i>=0;i--){
    const shang=(ke[keKeys[i]][0]||'').charAt(0);
    let rel='';
    if(i===3)rel=wxRel(shang,(ke.ke3[0]||'').charAt(0));
    else if(i===2)rel=wxRel(shang,riZhi);
    else if(i===1)rel=wxRel(shang,xiaShen[1]);
    else rel=gwRel(shang,riGan);
    const isBad=rel.includes('克')||rel.includes('⚡');
    h+=`<td class="rel-td${isBad?'':' good'}">${rel||'—'}</td>`;
  }
  h+='</tr>';

  // 下神行
  h+='<tr>';
  for(let i=3;i>=0;i--){
    h+=`<td><div class="xj">${xiaShen[i]||'?'}</div></td>`;
  }
  h+='</tr>';

  h+='</tbody></table></div>';

  // --- 三传 ---
  h+='<div class="card"><div class="card-title">三 传</div>';
  h+='<div class="sc-row">';
  const scArr=[{d:sc.chuChuan,ph:'初传 · 发端',init:true},{d:sc.zhongChuan,ph:'中传 · 过程',init:false},{d:sc.moChuan,ph:'末传 · 结局',init:false}];
  scArr.forEach((s,i)=>{
    const dzhi=s.d[0]||'?',jiang=s.d[1]||'',liuqin=s.d[2]||'',dungan=s.d[3]||'';
    const isKong=r.dateInfo.kong.includes(dzhi);
    h+=`<div class="sc-block${s.init?' init':''}">`;
    if(i===0)h+=`<div class="keti-badge">${sc.keTi}</div>`;
    h+=`<div class="ph">${s.ph}</div>`;
    h+=`<div class="zhi" style="${isKong?'color:var(--red)':''}">${dzhi}</div>`;
    h+=`<div class="sub">${jiang} · ${liuqin}${dungan?' · 遁'+dungan:''}${isKong?' · <span style="color:var(--red)">空亡</span>':''}</div>`;
    h+='</div>';
    if(i<2)h+='<div class="sc-arrow">→</div>';
  });
  h+='</div></div>';

  // --- 十二天将 ---
  h+='<div class="card"><div class="card-title">十二天将</div><div class="tj-grid">';
  for(const z of ZHI){
    const isGr=tj[z]==='贵人';
    h+=`<div class="tj-item${isGr?' gr':''}"><div class="dz">${z}</div><div class="nm">${tj[z]||'?'}</div></div>`;
  }
  h+='</div></div>';

  // --- 干支分析 ---
  const gs=(ke.ke1[0]||'').charAt(0),zs=(ke.ke3[0]||'').charAt(0);
  const gJiang=ke.ke1[1]||'',zJiang=ke.ke3[1]||'';
  const goodJ=['贵人','青龙','六合','太常','天后'];
  const badJ=['白虎','腾蛇','玄武'];
  const gGood=goodJ.includes(gJiang),gBad=badJ.includes(gJiang);
  const zGood=goodJ.includes(zJiang),zBad=badJ.includes(zJiang);

  h+='<div class="card"><div class="card-title">干支速断</div>';
  h+=`<div class="an-row"><span class="L">日干支</span><span class="R">${riGanZhi}</span></div>`;
  h+=`<div class="an-row"><span class="L">干上神（自身）</span><span class="R">${gs} · ${gJiang}${r.dateInfo.kong.includes(gs)?' <b style="color:var(--red)">空</b>':''}</span></div>`;
  h+=`<div class="an-row"><span class="L">支上神（他人/宅）</span><span class="R">${zs} · ${zJiang}${r.dateInfo.kong.includes(zs)?' <b style="color:var(--red)">空</b>':''}</span></div>`;
  h+=`<div class="an-row"><span class="L">干上气势</span>${gGood?'<span class="R g">🟢 吉将临身 · 气势通畅</span>':gBad?`<span class="R b">🔴 ${gJiang}临干 · 压力在身</span>`:'<span class="R w">🟡 中性 · 平淡待时</span>'}</div>`;
  h+=`<div class="an-row"><span class="L">支上气势</span>${zGood?'<span class="R g">🟢 吉将临支 · 彼方气旺</span>':zBad?`<span class="R b">🔴 凶将临支 · 彼方受压</span>`:'<span class="R">— 平常</span>'}</div>`;

  // 三传六亲链
  const lqChain=scArr.map(s=>s.d[2]||'').filter(Boolean).join(' → ');
  h+=`<div class="an-row"><span class="L">三传六亲</span><span class="R">${lqChain||'—'}</span></div>`;

  // 课体详析
  h+=`<div class="an-row"><span class="L">课体</span><span class="R" style="color:var(--gold-lt)">${sc.keTi} · ${keTiDesc(sc.keTi)}</span></div>`;

  // 贵人状态
  const guiPos=ZHI.find(z=>tj[z]==='贵人');
  h+=`<div class="an-row"><span class="L">贵人治所</span><span class="R">${guiPos||'?'} · ${tj[guiPos]||''}</span></div>`;

  h+='</div>';

  // --- 神煞 ---
  h+='<div class="card"><div class="card-title">神 煞</div>';
  const ssByType=categorizeShenSha(r.shenSha);
  for(const [cat,tags] of Object.entries(ssByType)){
    if(!tags.length)continue;
    h+=`<div class="ss-group"><div class="ss-label">${cat}</div><div class="ss-row">`;
    for(const t of tags){
      h+=`<span class="ss-tag${t.bad?' bad':''}" title="${t.desc||''}">${t.name}<span class="ss-v">${t.value}</span></span>`;
    }
    h+='</div></div>';
  }
  h+='</div>';

  $('result').innerHTML=h;
  $('result').classList.add('on');
}

// ===== 辅助函数 =====
function panCell(z,tp,tj,dg,jc,dp){
  if(!z)return'<div></div>';
  const t=tp[z]||'?',j=tj[z]||'',d=dg[z]||'',c=jc[z]||'';
  const isGui=j==='贵人',hasJc=!!c;
  let cls='pan-cell';
  if(hasJc)cls+=' has-jc';
  if(isGui)cls+='' /* no special class needed for cell */;
  let inner='';
  if(c)inner+=`<div class="jc">${c}</div>`;
  inner+=`<div class="tp"${isGui?' style="color:#ffe090"':''}>${t}</div>`;
  if(j)inner+=`<div class="tj"${isGui?' style="color:#ffe090"':''}>${j}</div>`;
  if(d)inner+=`<div class="dg">遁${d}</div>`;
  inner+=`<div class="dp">${dp[z]||z}</div>`;
  return `<div class="${cls}">${inner}</div>`;
}

function keTiDesc(kt){
  const m={
    '元首':'上克下 · 顺局 · 百事宜先发制人',
    '重审':'下克上 · 逆局 · 事须三思后行',
    '涉害':'多克并存 · 事情复杂需细致抉择',
    '遥克':'蒿矢/弹射 · 力轻而远 · 待时发力',
    '昴星':'虎视/冬蛇 · 闭塞不通 · 宜守不宜攻',
    '别责':'借势成事 · 须借他人之力',
    '八专':'独足 · 事有专主 · 不宜旁骛',
    '反吟':'反复不定 · 来得快去得快 · 宜速决',
    '伏吟':'迟滞不动 · 守旧待时 · 不宜妄动'
  };
  return m[kt]||'详参课传';
}

function categorizeShenSha(ss){
  const cats={吉神:[],凶煞:[],其他:[]};
  const badSet=new Set(['岁破','病符','丧门','吊客','白虎','岁墓','死气','死神','月破','四废','破碎','劫煞','亡神','天鬼','天刑','天狱','飞廉','大煞','小煞','血支','血忌','四丘','四墓','孤辰','寡宿','月厌','奸门','丧车','火鬼','游神','官符','岁刑','天贼','浴盆']);
  for(const s of ss){
    const bad=badSet.has(s.name);
    (bad?cats['凶煞']:cats['吉神']).push({...s,bad});
  }
  return cats;
}
