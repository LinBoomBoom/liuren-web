<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大六壬 · 在线排盘</title>
<style>
:root{--bg:#060a10;--card:#0d1320;--card2:#111827;--border:#1a2740;--border2:#243550;--gold:#c8a96e;--gold2:#a08048;--gold3:#e0cba0;--text:#c8d0d8;--dim:#687080;--dim2:#485060;--red:#e06060;--green:#5cb888;--blue:#68a0d8;--purple:#a888d8;--warn:#d4a840;--font:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.7}
.container{max-width:680px;margin:0 auto;padding:0 16px 40px}

/* Header */
.hd{text-align:center;padding:40px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px}
.hd h1{font-size:26px;color:var(--gold);letter-spacing:3px;font-weight:700}
.hd .sub{font-size:12px;color:var(--dim);margin-top:6px;letter-spacing:2px}

/* Loading */
.ld{text-align:center;padding:48px 0;display:none}
.ld.on{display:block}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-text{color:var(--dim);font-size:13px;letter-spacing:1px}

#result{display:none}
#result.on{display:block}

/* ===== 时间卡片 ===== */
.tcard{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:28px 24px 20px;margin-bottom:20px}
.tcard .tclabel{font-size:11px;color:var(--dim2);letter-spacing:2px;text-align:center;margin-bottom:20px}
/* 时间展示区 */
.td-show{text-align:center;margin-bottom:22px}
.td-show .td-main{font-size:30px;color:var(--gold3);font-weight:200;letter-spacing:2px;line-height:1.3}
.td-show .td-sub{font-size:13px;color:var(--dim);margin-top:4px;letter-spacing:1px}
.td-show .td-bazi{font-size:16px;color:var(--gold);letter-spacing:3px;font-weight:600;margin-top:8px}
/* 选择器行 */
.sel-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:flex-end;padding-top:18px;border-top:1px solid var(--border)}
.sel-row .sg{display:flex;flex-direction:column;align-items:center;gap:4px}
.sel-row .sg label{font-size:9px;color:var(--dim2);letter-spacing:1px}
.sel-row .sg select{background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 6px;font-size:13px;outline:none;text-align:center;appearance:none;-webkit-appearance:none;cursor:pointer;min-width:58px;transition:border-color .2s,box-shadow .2s;font-family:var(--font)}
.sel-row .sg select:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,169,110,.15)}
.sel-row .sg select:hover{border-color:var(--dim)}
.btn{background:linear-gradient(135deg,#c8a96e,#9a7840);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:13px;cursor:pointer;letter-spacing:1px;font-weight:600;height:42px;transition:all .25s ease}
.btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,169,110,.25)}
.btn:active{transform:translateY(0)}
.btn-go{display:block;width:240px;margin:14px auto 0;height:48px;font-size:15px;letter-spacing:3px;border-radius:12px}
.btn-ghost{background:transparent;border:1px solid var(--gold2);color:var(--gold);padding:8px 16px;font-size:12px;cursor:pointer;letter-spacing:1px;border-radius:20px;height:36px;transition:all .25s ease}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold3);background:rgba(200,169,110,.08);transform:translateY(-1px)}

/* ===== 信息条 ===== */
.ibar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.it{background:rgba(200,169,110,.07);border:1px solid rgba(200,169,110,.15);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--gold3);letter-spacing:.5px}
.it b{color:var(--gold);font-weight:600}

/* ===== 分析报告 ===== */
.an-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;margin-bottom:16px}
.an-card .an-title{font-size:16px;color:var(--gold);margin-bottom:22px;letter-spacing:2px;font-weight:600;text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border)}
.an-block{margin-bottom:20px}
.an-block:last-child{margin-bottom:0}
.an-block .an-h{font-size:13px;color:var(--gold3);margin-bottom:10px;font-weight:600;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.an-block .an-h .an-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;letter-spacing:.5px}
.an-tag.good{background:rgba(92,184,136,.15);color:var(--green)}
.an-tag.bad{background:rgba(224,96,96,.15);color:var(--red)}
.an-tag.warn{background:rgba(212,168,64,.15);color:var(--warn)}
.an-block .an-sub{font-size:11px;color:var(--dim);margin-bottom:8px;letter-spacing:.5px}
.an-block .an-p{font-size:14px;line-height:2;color:var(--text)}
.an-block .an-p em{color:var(--gold3);font-style:normal;font-weight:500}
.an-summary{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:20px;margin-top:24px;text-align:center}
.an-summary .as-big{font-size:17px;font-weight:700;letter-spacing:2px;margin-bottom:6px}
.an-summary .as-big.good{color:var(--green)}
.an-summary .as-big.bad{color:var(--red)}
.an-summary .as-big.warn{color:var(--warn)}
.an-summary .as-sub{font-size:11px;color:var(--dim)}

/* ===== 求测问题 ===== */
.qwrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--border);margin-top:14px}
.qwrap input{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:10px 16px;font-size:13px;outline:none;letter-spacing:.5px;transition:border-color .25s,box-shadow .25s;font-family:var(--font)}
.qwrap input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,169,110,.12)}
.qwrap input::placeholder{color:var(--dim2)}
.qcat{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.qcat .qc{background:rgba(200,169,110,.05);border:1px solid rgba(200,169,110,.1);color:var(--dim);border-radius:14px;padding:5px 14px;font-size:11px;cursor:pointer;transition:all .2s ease;letter-spacing:.5px;white-space:nowrap;user-select:none}
.qcat .qc:hover{border-color:var(--gold2);color:var(--gold3);background:rgba(200,169,110,.1);transform:translateY(-1px)}
.qcat .qc.on{background:rgba(200,169,110,.15);border-color:var(--gold2);color:var(--gold);font-weight:500}
@media(max-width:480px){
  .hd h1{font-size:22px}
  .td-show .td-main{font-size:22px}
  .sel-row .sg select{min-width:50px;font-size:12px;padding:7px 4px}
  .an-card{padding:20px 16px}
  .btn-go{width:100%}
}
</style>
</head>
<body>
<div class="container">
<div class="hd"><h1>🔮 大六壬 · 在线排盘</h1><p class="sub">输入时间 · 即刻断课</p></div>

<!-- 时间卡片 -->
<div class="tcard">
  <div class="tclabel">▼ 起 课 时 间</div>
  <div class="td-show" id="ts">
    <div class="td-main">—</div>
    <div class="td-sub">—</div>
    <div class="td-bazi">—</div>
  </div>
  <div class="sel-row">
    <div class="sg"><label>年</label><select id="sy"></select></div>
    <div class="sg"><label>月</label><select id="sm"></select></div>
    <div class="sg"><label>日</label><select id="sd"></select></div>
    <div class="sg split" style="padding-top:20px">·</div>
    <div class="sg"><label>时</label><select id="sh"></select></div>
    <button class="btn-ghost" onclick="goNow()">此刻</button>
  </div>
  <div class="qwrap">
    <input id="sq" type="text" placeholder="输入求测问题，如：问事业前程 / 问感情姻缘 / 问财运投资…" onkeydown="if(event.key==='Enter')go()">
    <div class="qcat" id="qcat">
      <span class="qc" onclick="pickQ('事业')">💼 事业</span>
      <span class="qc" onclick="pickQ('财运')">💰 财运</span>
      <span class="qc" onclick="pickQ('感情')">💕 感情</span>
      <span class="qc" onclick="pickQ('健康')">🏥 健康</span>
      <span class="qc" onclick="pickQ('出行')">✈️ 出行</span>
      <span class="qc" onclick="pickQ('官讼')">⚖️ 官讼</span>
    </div>
  </div>
  <button class="btn btn-go" onclick="go()">🔮 开 始 断 课</button>
</div>

<div class="ld" id="ld"><div class="spin"></div><div class="ld-text">大六壬起课中…</div></div>
<div id="result"></div>

</div>

<script>
// ========== 常量 ==========
const WX_M={寅:'木',卯:'木',巳:'火',午:'火',申:'金',酉:'金',亥:'水',子:'水',辰:'土',戌:'土',丑:'土',未:'土'};
const GW_M={甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
const WO=['木','火','土','金','水'];
const ZHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const JG={甲:'寅',乙:'辰',丙:'巳',丁:'未',戊:'巳',己:'未',庚:'申',辛:'戌',壬:'亥',癸:'丑'};
const SC_MAP={0:'子',1:'丑',2:'丑',3:'寅',4:'卯',5:'卯',6:'辰',7:'辰',8:'巳',9:'巳',10:'午',11:'午',12:'未',13:'未',14:'申',15:'申',16:'酉',17:'酉',18:'戌',19:'戌',20:'亥',21:'亥',22:'亥',23:'子'};
const SC_NAME={子:'子时 · 夜半',丑:'丑时 · 鸡鸣',寅:'寅时 · 平旦',卯:'卯时 · 日出',辰:'辰时 · 食时',巳:'巳时 · 隅中',午:'午时 · 日中',未:'未时 · 日昳',申:'申时 · 晡时',酉:'酉时 · 日入',戌:'戌时 · 黄昏',亥:'亥时 · 人定'};
const WD=['日','一','二','三','四','五','六'];
const BAD_SHAS=new Set(['岁破','病符','丧门','吊客','白虎','岁墓','死气','死神','月破','四废','破碎','劫煞','亡神','天鬼','天刑','天狱','飞廉','大煞','小煞','血支','血忌','四丘','四墓','孤辰','寡宿','月厌','奸门','丧车','火鬼','游神','官符','岁刑','天贼']);
const GOOD_J=['贵人','青龙','六合','太常','天后'];
const BAD_J=['白虎','腾蛇','玄武'];

// ========== 选择器初始化 ==========
function initSelects(){
  const now=new Date(),cy=now.getFullYear();
  // 年：当前-10 ~ 当前+2（允许超前两年预测）
  let yOpt='';for(let i=cy-10;i<=cy+2;i++)yOpt+=`<option value="${i}"${i===cy?' selected':''}>${i}</option>`;
  $('sy').innerHTML=yOpt;
  // 月：1-12 无限制
  let mOpt='';for(let i=1;i<=12;i++)mOpt+=`<option value="${i}"${i===now.getMonth()+1?' selected':''}>${i}</option>`;
  $('sm').innerHTML=mOpt;
  // 日：1-31 无限制
  let dOpt='';for(let i=1;i<=31;i++)dOpt+=`<option value="${i}"${i===now.getDate()?' selected':''}>${i}</option>`;
  $('sd').innerHTML=dOpt;
  // 时：0-23 无限制
  let hOpt='';for(let i=0;i<=23;i++)hOpt+=`<option value="${i}"${i===now.getHours()?' selected':''}>${String(i).padStart(2,'0')}</option>`;
  $('sh').innerHTML=hOpt;
}

// ========== 辅助函数 ==========
function $(id){return document.getElementById(id);}
function getSC(h){return SC_MAP[h]||'子';}
function wxRel(a,b){const wa=WX_M[a]||'',wb=WX_M[b]||'';if(!wa||!wb)return'';const ai=WO.indexOf(wa),bi=WO.indexOf(wb);if(ai===bi)return'比和';if((ai+2)%5===bi)return'上克下';if((bi+2)%5===ai)return'下克上';return'上生下';}
function gwxRel(a,g){const wa=WX_M[a]||'',wb=GW_M[g]||'';if(!wa||!wb)return'';const ai=WO.indexOf(wa),bi=WO.indexOf(wb);if(ai===bi)return'比和';if((ai+2)%5===bi)return'神克干⚡';if((bi+2)%5===ai)return'干克神';return'神生干';}

// ========== 分类标签 ==========
function pickQ(tag){
  const inp=$('sq'),cur=inp.value.trim();
  const chips=$('qcat').querySelectorAll('.qc');
  let active='';
  chips.forEach(c=>{if(c.textContent.includes(tag)){c.classList.toggle('on');if(c.classList.contains('on'))active=tag;}else{c.classList.remove('on')}});
  if(!active&&!cur){inp.value='';return}
  if(!active){inp.value=cur;return}
  const prefixes={事业:'问事业前程：',财运:'问财运投资：',感情:'问感情姻缘：',健康:'问身体健康：',出行:'问出行远行：',官讼:'问官讼纠纷：'};
  const pfx=prefixes[tag]||`问${tag}：`;
  const bare=cur.replace(/^问[^：:]*[：:]/,'').trim();
  inp.value=pfx+(bare||'');
  inp.focus();
}

// ========== 交互 ==========
function goNow(){
  const n=new Date();
  $('sy').value=n.getFullYear();$('sm').value=n.getMonth()+1;$('sd').value=n.getDate();
  $('sh').value=n.getHours();
  showCurrentTime();
}
async function go(){
  const y=+$('sy').value,m=+$('sm').value,d=+$('sd').value,h=+$('sh').value;
  if(!y||!m||!d){return}
  $('ld').classList.add('on');$('result').classList.remove('on');
  window.scrollTo({top:0,behavior:'smooth'});
  try{
    const question=$('sq').value.trim();
    const [resp,aiResp]=await Promise.all([
      fetch('/api/liuren',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:y,month:m,day:d,hour:h,minute:0})}),
      fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:y,month:m,day:d,hour:h,question})})
    ]);
    const r=await resp.json();
    if(r.error){alert(r.error);return}
    const aiResult=await aiResp.json().catch(()=>({fallback:true}));
    showTime(r.dateInfo,y,m,d,h);
    renderAnalysis(r,question,aiResult);
  }catch(e){alert('请求失败: '+e.message)}
  finally{$('ld').classList.remove('on')}
}

function showTime(di,y,m,d,h){
  const dt=new Date(y,m-1,d,h,0),sc=getSC(h);
  $('ts').innerHTML=`
    <div class="td-main">${y}年${String(m).padStart(2,'0')}月${String(d).padStart(2,'0')}日 星期${WD[dt.getDay()]} ${String(h).padStart(2,'0')}:00</div>
    <div class="td-sub">${SC_NAME[sc]} · 月将${di.yuejiang} · 旬${di.xun} · 空亡 ${di.kong.join('、')}</div>
    <div class="td-bazi">${di.bazi}</div>`;
}

function showCurrentTime(){
  const n=new Date();
  const y=n.getFullYear(),m=n.getMonth()+1,d=n.getDate(),h=n.getHours();
  const dt=new Date(y,m-1,d,h,0),sc=getSC(h);
  $('ts').innerHTML=`
    <div class="td-main">${y}年${String(m).padStart(2,'0')}月${String(d).padStart(2,'0')}日 星期${WD[dt.getDay()]} ${String(h).padStart(2,'0')}:00</div>
    <div class="td-sub">${SC_NAME[sc]} · 请选择时间后起课</div>
    <div class="td-bazi">—</div>`;
}

// ============================================================
//  断 课 分 析 引 擎
// ============================================================
function buildAnalysis(r,question){
  const bz=r.dateInfo.bazi.split(' '),riGan=bz[2][0],riZhi=bz[2][1];
  const sc=r.sanChuan,tj=r.tianDiPan.tianJiang;
  const gs=(r.siKe.ke1[0]||'').charAt(0),zs=(r.siKe.ke3[0]||'').charAt(0);
  const gJ=r.siKe.ke1[1]||'',zJ=r.siKe.ke3[1]||'';
  const blocks=[];

  // 0. 问题上下文
  if(question){
    blocks.push(analyzeContext(question,riGan,riZhi,gs,gJ,zs,zJ,sc,tj,r.dateInfo));
  }

  // 1. 课体总论
  blocks.push(analyzeKeTi(sc.keTi));
  // 2. 三传详解
  blocks.push(analyzeSanChuan(sc,r.dateInfo));
  // 3. 干支解读
  blocks.push(analyzeGan(riGan,riZhi,gs,gJ,zs,zJ,tj,sc,r.dateInfo));
  // 4. 天将提要
  blocks.push(analyzeTianJiang(tj,sc));
  // 5. 神煞点睛
  blocks.push(analyzeShenSha(r.shenSha,riGan,riZhi,gs,zs));
  // 6. 综合断语
  blocks.push(doSummary(blocks,riGan,riZhi,gs,gJ,zs,zJ,sc,tj,r,question));

  return blocks;
}

function analyzeKeTi(kt){
  const map={
    '元首':{t:'元首课 · 上克下',l:'吉',c:`课名<em>元首</em>，以上克下取用。天地之道，上制下为顺，此课君臣和合、上下同心。占事多主顺利，宜<em>主动出击、先发制人</em>。象曰："天地泰和，君臣会遇，万物发生"。求谋易遂，官讼得理，婚可成，病易愈。`},
    '重审':{t:'重审课 · 下克上',l:'平',c:`课名<em>重审</em>，以下克上取用。逆局也，事须<em>三思而后行</em>，不可冒进。象曰："下情上达，事当再审"。先难后易，初有阻而后通。宜先谋定而后动，不可仓促行事。`},
    '涉害':{t:'涉害课 · 多克并存',l:'平',c:`课名<em>涉害</em>，多克并存，事体<em>复杂</em>，须细致抉择。象曰："涉深履险，事须审度"。几方牵制，非一言可决。宜冷静分析，权衡利弊后再行动。`},
    '遥克':{t:'遥克课 · 蒿矢/弹射',l:'平',c:`课名<em>遥克</em>，克力轻而远，如蒿矢弹射，<em>力有不逮</em>。象曰："远而无力，待时后发"。所谋之事虽有机缘，但力量不足，须积蓄待时。不宜强求，当顺势而为。`},
    '昴星':{t:'昴星课 · 虎视/冬蛇',l:'凶',c:`课名<em>昴星</em>，闭塞不通之象。虎视眈眈或冬蛇蛰伏，<em>宜守不宜攻</em>。象曰："闭门塞窦，一动不如一静"。此课多主阻滞、等候，不宜妄动。所谋事缓，须忍耐待时。`},
    '别责':{t:'别责课 · 借力成事',l:'平',c:`课名<em>别责</em>，借势成事之课。自身之力不足，<em>须借他人之力</em>方能成功。象曰："别求他路，借力而行"。宜与人合作，或另辟蹊径，不可单打独斗。`},
    '八专':{t:'八专课 · 独足',l:'平',c:`课名<em>八专</em>，独足之象，事有专主，<em>不宜旁骛</em>。象曰："一足难行，专一可成"。精力集中则事成，分散则事败。宜专注一事，不可三心二意。`},
    '反吟':{t:'反吟课 · 反复不定',l:'凶',c:`课名<em>反吟</em>，天地对冲，反复不定。来得<em>快去得快</em>，宜速决不宜拖延。象曰："反复无常，速则得利"。占出行主速返，占事主变化快。宜果断决策，优柔则失机。`},
    '伏吟':{t:'伏吟课 · 迟滞不动',l:'凶',c:`课名<em>伏吟</em>，天地同宫，<em>迟滞不动</em>。守旧待时之象。象曰："伏而不动，守株待兔"。百事迟缓，不宜妄动。宜守不宜攻，宜静不宜动。耐心等待时机到来。`}
  };
  const m=map[kt]||{t:kt, l:'平', c:`课体<em>${kt}</em>，详参三传以定吉凶。`};
  return {title:'一、课体总论',sub:m.t,content:m.c,level:m.l};
}

function analyzeSanChuan(sc,di){
  const [cz,cj,cl,cd]=sc.chuChuan;
  const [zz,zj,zl,zd]=sc.zhongChuan;
  const [mz,mj,ml,md]=sc.moChuan;
  const isCK=di.kong.includes(cz),isZK=di.kong.includes(zz),isMK=di.kong.includes(mz);
  let c='三传者，事发之脉络也。';

  c+=`\n<em>初传${cz}</em>（${cj}·${cl}${cd?'·遁'+cd:''}${isCK?'·空亡':''}），为事发之<em>端</em>。此乃一局之机，万事由此而起。`;
  if(isCK)c+='初传空亡，事起虚浮，开端不利，出师无名。';
  else if(GOOD_J.includes(cj))c+='吉将临初，发端顺畅，天地人和。';
  else if(BAD_J.includes(cj))c+='凶将临初，发端受阻，宜谨慎行事。';
  else c+='中平之象，发端平常。';

  c+=`\n<em>中传${zz}</em>（${zj}·${zl}${zd?'·遁'+zd:''}${isZK?'·空亡':''}），为事发之<em>过程</em>。初传之延续，事之中途。`;
  if(isZK)c+='中传空亡，中途生变，核心环节虚悬。';
  else if(GOOD_J.includes(zj))c+='中得吉将，过程顺利，贵人相助。';
  else if(zj==='贵人')c+='中传遇贵人，过程中有贵人扶助，宜把握机缘。';
  else if(BAD_J.includes(zj))c+='中传凶将，过程坎坷，须有心理准备。';
  else c+='中平过渡，事态自然发展。';

  c+=`\n<em>末传${mz}</em>（${mj}·${ml}${md?'·遁'+md:''}${isMK?'·空亡':''}），为事发之<em>结局</em>。三传之收束，事之归处。`;
  if(isMK)c+='末传空亡，结局虚悬，不了了之。';
  else if(GOOD_J.includes(mj))c+='末传吉将，结局美满，善始善终。';
  else if(BAD_J.includes(mj))c+='末传凶将，结局不利，须早做准备。';
  else if(ml==='妻财')c+='末传见财，事终有利可得。';
  else if(ml==='官鬼')c+='末传见官鬼，终有官讼之忧，或职场压力。';
  else if(ml==='子孙')c+='末传见子孙，终得解脱，后继有人。';
  else if(ml==='父母')c+='末传见父母，终得庇护，文书有成。';
  else if(ml==='兄弟')c+='末传见兄弟，终有同辈之助，或分财之象。';
  else c+='结局平顺。';

  const chain=[cl,zl,ml].filter(Boolean).join(' → ');
  if(chain)c+=`\n三传六亲链：<em>${chain}</em>。`;

  const kongs=[isCK&&'初',isZK&&'中',isMK&&'末'].filter(Boolean);
  if(kongs.length)c+=`\n⚠️ ${kongs.join('、')}传逢空亡，${kongs.length>=2?'课体虚浮，所谋之事有头无尾之象':'相应阶段虚而不实'}。`;

  let level='平';
  if(isCK&&isMK)level='凶';
  else if(!isCK&&!isMK&&GOOD_J.includes(mj))level='吉';
  return {title:'二、三传详解',sub:`${sc.keTi} · ${cz}→${zz}→${mz}`,content:c,level:level};
}

function analyzeGan(riGan,riZhi,gs,gJ,zs,zJ,tj,sc,di){
  const isGSK=di.kong.includes(gs),isZSK=di.kong.includes(zs);
  let c='';

  c+=`日干<em>${riGan}</em>，干上神<em>${gs}</em>（${gJ}）${isGSK?'·空亡':''}，代表<em>自身状态</em>与<em>当前处境</em>。`;
  const gr=gwxRel(gs,riGan);
  if(gr==='神克干⚡')c+='上神克日干，外部环境对自身形成压制，压力较大。';
  else if(gr==='干克神')c+='日干克上神，自身有能力驾驭当前局面，但亦耗力。';
  else if(gr==='神生干')c+='上神生日干，外部力量生助自身，气运亨通。';
  else c+='上神与日干比和，时势与自身能力匹配。';

  if(gJ==='贵人'&&!isGSK)c+='干上见<em>贵人</em>，天乙临身，主得贵人扶持、遇事有人相助，百事吉庆。';
  else if(gJ==='青龙'&&!isGSK)c+='干上见<em>青龙</em>，财喜临门，求财得利，事业顺遂。';
  else if(gJ==='白虎'&&!isGSK)c+='干上见<em>白虎</em>，血光之象，或主压力、伤病、官讼，宜小心行事。';
  else if(gJ==='腾蛇'&&!isGSK)c+='干上见<em>腾蛇</em>，虚惊怪异，心神不宁，防口舌是非。';

  c+=`\n日支<em>${riZhi}</em>，支上神<em>${zs}</em>（${zJ}）${isZSK?'·空亡':''}，代表<em>他人他事</em>与<em>所处环境</em>。`;
  const zr=wxRel(zs,riZhi);
  if(zr==='上克下')c+='支上神克日支，外部环境对人事不利，合作受阻。';
  else if(zr==='下克上')c+='日支克上神，自身能驾驭环境，但须花费心力。';
  else if(zr==='上生下')c+='上神生日支，环境对人事有利，得天时地利。';

  if(zJ==='青龙'&&!isZSK)c+='支上见<em>青龙</em>，宅舍兴旺，家业顺遂。';
  else if(zJ==='白虎'&&!isZSK)c+='支上见<em>白虎</em>，家宅不安，或有人事纷争。';
  else if(zJ==='玄武'&&!isZSK)c+='支上见<em>玄武</em>，防盗贼失物，注意小人暗算。';

  c+=`\n干上${gs}（${gJ}）vs 支上${zs}（${zJ}）`;
  if(gJ===zJ)c+='，干支同将，内外一致。';
  else if(GOOD_J.includes(gJ)&&BAD_J.includes(zJ))c+='，自身气运佳而环境不利，宜守不宜攻。';
  else if(BAD_J.includes(gJ)&&GOOD_J.includes(zJ))c+='，自身压力大而环境有利，可借外力解困。';

  let level='平';
  if(GOOD_J.includes(gJ)&&GOOD_J.includes(zJ))level='吉';
  else if(BAD_J.includes(gJ)&&BAD_J.includes(zJ))level='凶';
  return {title:'三、干支解读',sub:`${riGan}上${gs} · ${riZhi}上${zs}`,content:c,level:level};
}

function analyzeTianJiang(tj,sc){
  let c='';
  for(const z of ZHI){
    const name=tj[z]||'';
    if(name==='贵人')c+=`<em>贵人</em>治<em>${z}</em>，天乙所在，百煞退避，为全局最尊贵之神。问官得贵，问事得助。\n`;
    else if(name==='青龙')c+=`<em>青龙</em>在<em>${z}</em>，财喜之位，求财得利。\n`;
    else if(name==='白虎')c+=`<em>白虎</em>在<em>${z}</em>，凶威所在，防血光官讼。\n`;
    else if(name==='腾蛇')c+=`<em>腾蛇</em>在<em>${z}</em>，虚惊怪异，防口舌。\n`;
  }
  const jInSc=[sc.chuChuan[1],sc.zhongChuan[1],sc.moChuan[1]].filter(Boolean);
  const uniq=[...new Set(jInSc)];
  if(uniq.length)c+=`\n三传天将：${uniq.map(j=>'<em>'+j+'</em>').join('、')}。${uniq.every(j=>GOOD_J.includes(j))?'三传皆吉将，全局气运通畅。':uniq.some(j=>BAD_J.includes(j))?'三传见凶将，事须谨慎。':'吉凶交错，事有起伏。'}`;
  const guiZhi=ZHI.find(z=>tj[z]==='贵人');
  return {title:'四、天将点睛',sub:`贵人治${guiZhi||'?'} · ${guiZhi&&SC_NAME[guiZhi]?SC_NAME[guiZhi]:''}`,content:c||'十二天将各安其位。',level:'平'};
}

function analyzeShenSha(ss,riGan,riZhi,gs,zs){
  let c='';
  const keyN=['日德','日禄','天德','月德','天喜','天赦','生气','皇书','天诏','驿马','岁破','劫煞','亡神','破碎','白虎','丧门','吊客','孤辰','寡宿','四废'];
  const found=ss.filter(s=>keyN.includes(s.name));
  const gGood=[],gBad=[];
  for(const s of found)(BAD_SHAS.has(s.name)?gBad:gGood).push(s);
  if(gGood.length)c+='吉神：'+gGood.map(s=>`<em>${s.name}</em>在${s.value}`).join('、')+'。';
  if(gBad.length){if(c)c+='\n';c+='凶煞：'+gBad.map(s=>`<em>${s.name}</em>在${s.value}`).join('、')+'，宜避之。';}
  if(!c)c='关键神煞各安其位，无重大冲犯。';
  let level='平';
  if(gBad.length>3)level='凶';
  else if(gGood.length>3&&gBad.length<2)level='吉';
  return {title:'五、神煞提要',sub:`${gGood.length}吉 · ${gBad.length}凶`,content:c,level:level};
}

function doSummary(blocks,riGan,riZhi,gs,gJ,zs,zJ,sc,tj,r,question){
  const lv=blocks.map(b=>b.level);
  const gc=lv.filter(l=>l==='吉').length,bc=lv.filter(l=>l==='凶').length;
  let level='平',big='中平之卦';
  if(gc>=3&&bc===0){level='吉';big='吉利之课';}
  else if(bc>=3&&gc===0){level='凶';big='凶险之课';}
  else if(gc>bc){level='吉';big='偏吉之卦';}
  else if(bc>gc){level='凶';big='偏凶之卦';}

  const ctx=question?`针对所问之事，`:'';
  let c='';
  if(level==='吉'){
    c=`${ctx}纵观全课，气运亨通，<em>百事可谋</em>。天地人和，贵人相助，时机成熟，宜主动进取。`;
    if(gJ==='贵人')c+='尤以干上见贵人为最吉之兆，遇事有贵人相扶，无需过虑。';
    if(sc.keTi==='元首')c+='元首课配合吉将，大有可为，宜抢占先机。';
  }else if(level==='凶'){
    c=`${ctx}纵观全课，气运阻滞，<em>宜守不宜攻</em>。多有凶煞并临，事须谨慎，不可冒进。`;
    if(sc.keTi==='昴星'||sc.keTi==='伏吟'||sc.keTi==='反吟')c+=`${sc.keTi}课本为滞涩之象，更需耐心待时。`;
    c+='建议：大事缓办，小事速决，避免重大决策。待气运转好再行大事。';
  }else{
    c=`${ctx}纵观全课，<em>吉凶互见</em>，事有起伏。利小不利大，利缓不利急。`;
    c+='建议：小事可成，大事须谋定后动。把握吉神所在之时机，避开凶煞当令之方位。';
  }

  const chuE=r.dateInfo.kong.includes(sc.chuChuan[0]),moE=r.dateInfo.kong.includes(sc.moChuan[0]);
  if(chuE&&!moE)c+='\n初传虽空，末传不空，<em>先虚后实</em>，耐心等待自有转机。';
  if(!chuE&&moE)c+='\n初传不空，末传空亡，<em>先实后虚</em>，须及时收手，见好就收。';

  return {title:'六、综合断语',sub:big,content:c,level:level,bigText:big};
}

// ============================================================
//  问题感知分析
// ============================================================
function analyzeContext(q,riGan,riZhi,gs,gJ,zs,zJ,sc,tj,di){
  const cats=[
    {kw:['事业','工作','前程','职场','升职','跳槽','面试'],tag:'事业',good:['青龙','贵人','太常'],bad:['白虎','天空','勾陈'],liuqin:['官鬼','父母']},
    {kw:['财运','投资','理财','赚钱','生意','收入'],tag:'财运',good:['青龙','六合','太常'],bad:['玄武','天空','白虎'],liuqin:['妻财']},
    {kw:['感情','姻缘','恋爱','婚姻','分手','桃花','对象'],tag:'感情',good:['六合','天后','贵人'],bad:['腾蛇','玄武','白虎'],liuqin:['妻财','官鬼']},
    {kw:['健康','身体','疾病','病','医','手术'],tag:'健康',good:['太常','青龙'],bad:['白虎','腾蛇'],liuqin:['子孙']},
    {kw:['出行','远行','旅游','出差','移','迁'],tag:'出行',good:['青龙','六合','贵人'],bad:['白虎','腾蛇'],liuqin:[]},
    {kw:['官讼','诉讼','官司','纠纷','法律','仲裁'],tag:'官讼',good:['贵人','青龙'],bad:['白虎','天空','勾陈'],liuqin:['官鬼']}];
  let cat=null;
  for(const c of cats){for(const kw of c.kw){if(q.includes(kw)){cat=c;break}}if(cat)break}
  // 提取具体问题（去掉前缀）
  const bare=q.replace(/^问[^：:]*[：:]\s*/,'').trim()||q;
  let c='',level='平';
  const hasGoodJ=[gJ,zJ,sc.chuChuan[1],sc.zhongChuan[1],sc.moChuan[1]].some(j=>cat&&cat.good.includes(j));
  const hasBadJ=[gJ,zJ,sc.chuChuan[1],sc.zhongChuan[1],sc.moChuan[1]].some(j=>cat&&cat.bad.includes(j));
  const hasLQ=[sc.chuChuan[2],sc.zhongChuan[2],sc.moChuan[2]].some(l=>cat&&cat.liuqin.includes(l));
  if(!cat){
    c=`您所问：<em>${q}</em>。未能识别具体求测方向，建议选择事业/财运/感情等分类，以获取更精准解读。以下为该时辰全课综合分析。`;
  }else{
    // 开头直接引用用户问题
    c=`您所问：<em>${bare}</em>。针对<em>${cat.tag}</em>方向，课象分析如下：`;
    if(cat.tag==='事业'){if(hasLQ&&hasGoodJ)c+=`官鬼/父母与吉将同现，<em>事业运较佳</em>。职场升迁、考试文书皆有助力，宜主动出击。`;else if(hasBadJ)c+=`白虎/勾陈显现，<em>事业有阻力</em>。或遇小人、或压力大，宜守不宜攻。`;else c+=`事业运<em>中平</em>。按部就班即可，不宜有大动作。`}
    else if(cat.tag==='财运'){if(hasLQ&&hasGoodJ)c+=`妻财得青龙/六合之助，<em>财运亨通</em>。求财有利，投资可期。`;else if(hasBadJ)c+=`玄武/天空显现，<em>财运有损</em>。防盗贼失财，不宜投机。`;else c+=`财运<em>中平</em>。小财可得，大财须待时机。`}
    else if(cat.tag==='感情'){if(hasLQ&&hasGoodJ)c+=`六合/天后显现，<em>感情运佳</em>。单身易遇良缘，有伴感情和睦。`;else if(hasBadJ)c+=`腾蛇/玄武显现，<em>感情有波折</em>。防口舌误会或小人插足。`;else c+=`感情运<em>中平</em>。稳定为主，新缘须待。`}
    else if(cat.tag==='健康'){if(hasBadJ)c+=`白虎/腾蛇显现，<em>健康须注意</em>。防外伤急症、心神不宁。`;else if(hasGoodJ)c+=`吉将照临，<em>健康无大碍</em>。注意日常保养即可。`;else c+=`健康<em>中平</em>。偶有小恙，无大妨碍。`}
    else if(cat.tag==='出行'){if(hasGoodJ&&!hasBadJ)c+=`吉将护佑，<em>出行顺利</em>。远行得利。`;else if(hasBadJ)c+=`凶将显现，<em>出行宜慎重</em>。防意外阻滞。`;else c+=`出行<em>中平</em>。近行可，远行需谨慎。`}
    else if(cat.tag==='官讼'){if(hasGoodJ)c+=`贵人青龙在位，<em>官讼有利</em>。有理可伸。`;else if(hasBadJ)c+=`白虎勾陈临位，<em>官讼不利</em>。宜和解。`;else c+=`官讼<em>中平</em>。宜寻求调解。`}
    if(hasGoodJ&&!hasBadJ)level='吉';else if(hasBadJ&&!hasGoodJ)level='凶';else level='平';
  }
  return {title:'所求之事',sub:cat?cat.tag:'综合',content:c,level:level};
}

// ============================================================
//  渲 染
// ============================================================
function renderAnalysis(r,question,aiResult){
  const bz=r.dateInfo.bazi.split(' '),riGan=bz[2][0],riZhi=bz[2][1];
  const sc=r.sanChuan;
  let h='';

  // 信息条
  h+='<div class="ibar">';
  h+=`<span class="it">月将 <b>${r.dateInfo.yuejiang}</b></span>`;
  h+=`<span class="it">空亡 <b>${r.dateInfo.kong.join('')}</b></span>`;
  h+=`<span class="it">课体 <b>${sc.keTi}</b></span>`;
  h+=`<span class="it">旬 <b>${r.dateInfo.xun}</b></span>`;
  h+=`<span class="it">驿马 <b>${r.dateInfo.yima}</b></span>`;
  h+='</div>';

  // 判断用 AI 还是规则引擎
  const useAI = aiResult && !aiResult.fallback && aiResult.content;
  const aiLabel = useAI ? '🤖 AI 深度解读' : '📋 规则断课报告';
  const aiSub = useAI ? '' : (aiResult?.reason ? `（AI 不可用：${aiResult.reason}，使用本地规则引擎）` : '');

  h+=`<div class="an-card"><div class="an-title">${aiLabel}</div>`;
  if(aiSub)h+=`<div style="text-align:center;font-size:11px;color:var(--dim2);margin-bottom:18px">${aiSub}</div>`;

  if(useAI){
    // AI 输出：直接展示，用简单段落格式
    const aiHtml = aiResult.content
      .replace(/\*\*(.+?)\*\*/g,'<em>$1</em>')
      .replace(/###?\s*(.+)/g,'<div class="an-h" style="margin-top:16px">$1</div>')
      .replace(/\n\n/g,'</p><p class="an-p">')
      .replace(/\n/g,'<br>');
    h+=`<div class="an-p"><p class="an-p">${aiHtml}</p></div>`;
    h+=`<div class="an-summary"><div class="as-sub">DeepSeek AI · 大六壬断课 | 仅供参考</div></div>`;
  }else{
    // 回退：JS 规则引擎
    const analysis=buildAnalysis(r,question);
    for(const b of analysis){
      const lv=b.level||'平';
      const bc=lv==='吉'?'good':lv==='凶'?'bad':'warn';
      const badge=lv==='吉'?'🟢 吉':lv==='凶'?'🔴 凶':'🟡 平';
      h+=`<div class="an-block">`;
      h+=`<div class="an-h">${b.title}<span class="an-tag ${bc}">${badge}</span></div>`;
      if(b.sub)h+=`<div class="an-sub">${b.sub}</div>`;
      h+=`<div class="an-p">${b.content.replace(/\n/g,'<br>')}</div>`;
      h+='</div>';
    }
    const sm=analysis[analysis.length-1];
    const sc2=sm.level==='吉'?'good':sm.level==='凶'?'bad':'warn';
    h+=`<div class="an-summary"><div class="as-big ${sc2}">${sm.bigText||'中平之卦'}</div><div class="as-sub">晴子 · 大六壬断课 | 仅供参考</div></div>`;
  }

  h+='</div>';
  $('result').innerHTML=h;
  $('result').classList.add('on');
  $('result').scrollIntoView({behavior:'smooth',block:'start'});
}

initSelects();
showCurrentTime();
